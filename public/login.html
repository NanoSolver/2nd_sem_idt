<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediLink — Login</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--red:#E24B4A;--red-dark:#A32D2D;--blue:#378ADD;--blue-dark:#2260a8;--blue-glow:rgba(55,138,221,0.15);--green:#1D9E75;--bg:#0D0D0F;--bg2:#131317;--bg3:#1A1A20;--bg4:#222228;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#F0EFE8;--text2:#8A8A94;--text3:#45454E;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;}
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:40px;}
.logo-icon{width:40px;height:40px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:22px;height:22px;fill:white;}
.logo-text{font-family:var(--mono);font-size:20px;font-weight:600;letter-spacing:0.04em;}
.logo-text span{color:var(--red);}
.role-tabs{display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:4px;margin-bottom:24px;}
.role-tab{padding:10px;border-radius:7px;border:none;background:transparent;color:var(--text2);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;}
.role-tab svg{width:15px;height:15px;flex-shrink:0;}
.role-tab.active-nurse{background:rgba(226,75,74,0.12);color:var(--red);}
.role-tab.active-doctor{background:var(--blue-glow);color:var(--blue);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:2rem;transition:border-color 0.3s;}
.card.nurse-mode{border-color:rgba(226,75,74,0.25);}
.card.doctor-mode{border-color:rgba(55,138,221,0.25);}
.card-title{font-size:17px;font-weight:600;margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--text2);margin-bottom:24px;font-family:var(--mono);}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
label{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:0.07em;text-transform:uppercase;}
input{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--sans);font-size:14px;padding:11px 14px;outline:none;transition:border-color 0.15s;width:100%;}
input::placeholder{color:var(--text3);}
.nurse-mode input:focus{border-color:rgba(226,75,74,0.5);background:var(--bg4);}
.doctor-mode input:focus{border-color:rgba(55,138,221,0.5);background:var(--bg4);}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:44px;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;display:flex;align-items:center;}
.pw-eye svg{width:16px;height:16px;}
.login-btn{width:100%;padding:13px;border:none;border-radius:8px;font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;}
.login-btn.nurse-btn{background:var(--red);color:white;}
.login-btn.nurse-btn:hover{background:var(--red-dark);}
.login-btn.doctor-btn{background:var(--blue);color:white;}
.login-btn.doctor-btn:hover{background:var(--blue-dark);}
.login-btn:disabled{opacity:0.5;cursor:not-allowed;}
.error-msg{background:rgba(226,75,74,0.1);border:1px solid rgba(226,75,74,0.3);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--red);font-family:var(--mono);margin-top:12px;display:none;}
.error-msg.show{display:block;}
.hint{text-align:center;margin-top:20px;font-size:11px;color:var(--text3);font-family:var(--mono);line-height:1.8;}
.hint span{color:var(--text2);}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake 0.35s ease;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z"/></svg></div>
    <span class="logo-text">Medi<span>Link</span></span>
  </div>
  <div class="role-tabs">
    <button class="role-tab active-nurse" id="tab-nurse" onclick="setRole('nurse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Nurse / Paramedic
    </button>
    <button class="role-tab" id="tab-doctor" onclick="setRole('doctor')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Doctor
    </button>
  </div>
  <div class="card nurse-mode" id="login-card">
    <div class="card-title" id="card-title">Nurse / Paramedic Login</div>
    <div class="card-sub" id="card-sub">Ambulance unit access</div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/>
        <button class="pw-eye" onclick="togglePw()" tabindex="-1">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button class="login-btn nurse-btn" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="error-msg" id="error-msg">Incorrect username or password</div>
  </div>
  <div class="hint">Nurse: <span>nurse / nurse123</span> &nbsp;·&nbsp; Doctor: <span>doctor / doctor123</span></div>
</div>
<script>
let currentRole='nurse';
function setRole(role){
  currentRole=role;
  document.getElementById('error-msg').classList.remove('show');
  document.getElementById('username').value='';
  document.getElementById('password').value='';
  const card=document.getElementById('login-card');
  const tabN=document.getElementById('tab-nurse');
  const tabD=document.getElementById('tab-doctor');
  if(role==='nurse'){card.className='card nurse-mode';tabN.className='role-tab active-nurse';tabD.className='role-tab';document.getElementById('card-title').textContent='Nurse / Paramedic Login';document.getElementById('card-sub').textContent='Ambulance unit access';document.getElementById('login-btn').className='login-btn nurse-btn';}
  else{card.className='card doctor-mode';tabN.className='role-tab';tabD.className='role-tab active-doctor';document.getElementById('card-title').textContent='Doctor Login';document.getElementById('card-sub').textContent='Hospital dashboard access';document.getElementById('login-btn').className='login-btn doctor-btn';}
  document.getElementById('username').focus();
}
async function doLogin(){
  const u=document.getElementById('username').value.trim().toLowerCase();
  const p=document.getElementById('password').value;
  const errEl=document.getElementById('error-msg');
  const btn=document.getElementById('login-btn');
  errEl.classList.remove('show');
  btn.disabled=true; btn.textContent='Signing in...';
  try{
    const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p,role:currentRole})});
    if(!res.ok){
      const d=await res.json();
      errEl.textContent=d.error||'Invalid credentials';
      errEl.classList.add('show');
      const card=document.getElementById('login-card');
      card.classList.add('shake');setTimeout(()=>card.classList.remove('shake'),400);
      document.getElementById('password').value='';
      btn.disabled=false; btn.textContent='Sign In';
      return;
    }
    const data=await res.json();
    sessionStorage.setItem('medilink_role',data.role);
    sessionStorage.setItem('medilink_user',data.username);
    window.location.href=data.role==='nurse'?'/nurse':'/doctor';
  }catch(e){
    errEl.textContent='Server error — is the server running?';
    errEl.classList.add('show');
    btn.disabled=false; btn.textContent='Sign In';
  }
}
function togglePw(){
  const inp=document.getElementById('password');
  inp.type=inp.type==='password'?'text':'password';
}
document.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('username').focus();
</script>
</body>
</html>
